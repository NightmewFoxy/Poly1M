[build]
builder = "NIXPACKS"

[deploy]
# LP rewards quoter (the RM200/day pilot -> ladder; STRATEGY_FINDINGS.md #4-5).
# LIVE only when the Railway service vars say so: LP_LIVE=1, LP_SHARES=200,
# LP_MARKETS=<pinned cond id>, LP_VIA_PROXY=<residential proxy url>.
# Without those it boots as a read-only dry run - safe default.
# Remote kill: set LP_STOP=1 and redeploy (cancel-all, then idle).
# Arb measurement (v3) retired 2026-07-02: fee wall, zero net-positive arbs.
startCommand = "python lp_quoter.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Mount a persistent volume at /data so positions.json and bot.log survive redeploys.
# Create the volume in the Railway dashboard (Service -> Settings -> Volumes), mount path /data.
# Then set the DATA_DIR env var to /data.
