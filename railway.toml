[build]
builder = "NIXPACKS"

[deploy]
# Runs the esports bot AND the BTC 5m sniper as sibling asyncio tasks in one
# container. Both inherit OUTBOUND_PROXY (iproyal) so CLOB calls avoid the
# Railway geoblock. See railway_main.py.
startCommand = "python railway_main.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Mount a persistent volume at /data so positions.json and bot.log survive redeploys.
# Create the volume in the Railway dashboard (Service -> Settings -> Volumes), mount path /data.
# Then set the DATA_DIR env var to /data.
